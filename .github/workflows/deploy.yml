name: Deploy to GitHub Pages

# Builds the Vite site and publishes it to GitHub Pages via the official
# Pages Actions (no gh-pages branch needed). Runs on every push to main.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token scopes required by deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one in-flight Pages deployment at a time; let a newer run supersede.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check, test, and build
        run: |
          npm test
          npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Accessibility gate (axe-core, WCAG A/AA)
        run: npm run test:a11y

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
