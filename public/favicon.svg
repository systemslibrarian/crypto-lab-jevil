<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Jevil">
  <rect width="32" height="32" rx="7" fill="#0c0a10"/>
  <!-- the safe plateau, then the cliff -->
  <path d="M5 11 H17 V27" fill="none" stroke="#e8413a" stroke-width="3.2"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- out-of-domain freebie (gold hollow dot) on the plateau -->
  <circle cx="9" cy="11" r="2.4" fill="none" stroke="#e2b13c" stroke-width="1.6"/>
  <!-- points tumbling off the cliff -->
  <circle cx="17" cy="20" r="2" fill="#e8413a"/>
  <circle cx="23" cy="26" r="1.7" fill="#e8413a" opacity="0.72"/>
</svg>
